# Default review-objectives checklist for the single-test-case reviewer.
# Load with autoqa.components.test_case_reviewer.load_default_review_objectives().
# Add, remove, or edit entries freely — the reviewer treats this as data, not schema.

- id: expected_result_support
  description: >
    Check that expected results include sufficient evidence to prove outcomes;
    flag gaps where evidence is incomplete.

- id: expected_result_spec_align
  description: >
    Verify results reflect all conditions in the requirement;
    flag gaps where outcomes are vague or incomplete.

- id: test_case_achieves
  description: >
    Ensure final steps verify intended outcomes;
    flag gaps where validation is missing.

- id: test_case_logical_sequence
  description: >
    Verify steps follow a logical flow from setup to verification;
    flag gaps where flow is inconsistent.

- id: test_case_setup_clarity
  description: >
    Ensure environment and prerequisites are clearly documented;
    flag ambiguity that may prevent repeatable execution.
